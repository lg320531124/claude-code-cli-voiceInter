# Claude Code CLI VoiceInter - Development Docker Compose
# Override for development environment

version: '3.8'

services:
  voiceInter:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
      - "3000:3000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - DEBUG=1
    volumes:
      - ./src:/app/src
      - ./server:/app/server
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./vite.config.js:/app/vite.config.js
    command: npm run dev:lan
    restart: unless-stopped